<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" (click)="cancelled.emit()">
    <div class="bg-white rounded-xl p-6 w-full max-w-md flex flex-col gap-4" (click)="$event.stopPropagation()">

        <div class="flex justify-between items-center">
            <h2 class="text-lg font-medium">Delete task</h2>
            <button class="text-gray-400 hover:text-gray-600" (click)="cancelled.emit()">✕</button>
        </div>

        <div class="flex flex-col gap-1 text-sm text-gray-600">
            <p>Are you sure you want to delete <strong class="text-gray-900">{{ task.title }}</strong>?</p>
            <p>This action cannot be undone.</p>
        </div>

        <div class="flex justify-end gap-2 pt-2">
            <button class="px-4 py-2 text-sm rounded-lg border hover:bg-gray-50"
                (click)="cancelled.emit()">Cancel</button>
            <button class="px-4 py-2 text-sm rounded-lg bg-red-500 text-white hover:bg-red-600"
                (click)="confirm()">Delete</button>
        </div>

    </div>
</div>
